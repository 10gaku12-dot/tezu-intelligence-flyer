<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TEZU Intelligence | AI業務診断</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&family=Inter:wght@700;900&display=swap" rel="stylesheet">
<style>

/* ══ 印刷設定 ════════════════════════════ */
@page { size: 210mm 297mm; margin: 0; }
@media print {
  html, body { width: 210mm; height: 297mm; }
  .page { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --g:  #d4a843;  /* ゴールド */
  --g2: #f2c65a;  /* ライト */
  --g3: #8c6818;  /* ダーク */
  --bk: #070707;  /* 背景 */
}

html { background: #1a1a1a; }
body {
  width: 210mm; margin: 0 auto;
  font-family: 'Noto Sans JP','Hiragino Kaku Gothic ProN','Meiryo',sans-serif;
}

/* ══ チラシ本体 ══════════════════════════ */
.page {
  width: 210mm; height: 297mm;
  background: var(--bk);
  position: relative; overflow: hidden;
}

/* ── ゴールドライン上下 ── */
.gl {
  position: absolute; left: 0; right: 0; height: 5px; z-index: 40;
  background: linear-gradient(90deg,
    transparent 0%,
    var(--g3) 8%, var(--g) 25%, var(--g2) 50%,
    var(--g) 75%, var(--g3) 92%, transparent 100%);
}
.gl-t { top: 0; }
.gl-b { bottom: 0; }

/* ── コーナーブラケット ── */
.ck {
  position: absolute; z-index: 40;
  width: 13mm; height: 13mm;
  border-color: rgba(212,168,67,.48); border-style: solid;
}
.ck-tl { top:8mm; left:8mm;    border-width:2px 0 0 2px; }
.ck-tr { top:8mm; right:8mm;   border-width:2px 2px 0 0; }
.ck-bl { bottom:8mm; left:8mm;  border-width:0 0 2px 2px; }
.ck-br { bottom:8mm; right:8mm; border-width:0 2px 2px 0; }

/* ══ SVG 放射レイヤー ════════════════════ */
.svgl {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 2;
}

/* ══ ヘッダー ═══════════════════════════ */
.hdr {
  position: absolute; top: 11mm; left: 0; right: 0;
  text-align: center; padding: 0 14mm; z-index: 20;
}
.hdr-badge {
  font-family: 'Inter', Arial, sans-serif;
  font-size: 6.5px; font-weight: 700; letter-spacing: 4px;
  color: rgba(212,168,67,.75); text-transform: uppercase;
  margin-bottom: 9px;
}
.hdr-main {
  font-size: 21px; font-weight: 900;
  color: #fff; line-height: 1.28; letter-spacing: -.3px;
}
.hdr-main .hl { color: var(--g); }

/* ── QR上コピー ── */
.sub {
  position: absolute; top: 30mm; left: 0; right: 0;
  text-align: center; padding: 0 12mm; z-index: 20;
}
.sub-ja {
  font-size: 17px; font-weight: 900;
  color: #fff; line-height: 1.32; letter-spacing: -.2px;
}
.sub-ja em {
  font-style: normal; color: var(--g);
  border-bottom: 2px solid rgba(212,168,67,.7); padding-bottom: 1px;
}

/* ══ QRグロー（背景光） ══════════════════ */
.qr-glow {
  position: absolute; left: 50%; top: 49%;
  transform: translate(-50%,-50%);
  width: 148mm; height: 148mm; border-radius: 50%;
  background: radial-gradient(circle,
    rgba(212,168,67,.42) 0%,
    rgba(212,168,67,.18) 28%,
    rgba(212,168,67,.06) 50%,
    transparent 68%);
  pointer-events: none; z-index: 3;
}

/* ══ QRコード（絶対的主役） ══════════════ */
/*
  QR中心: left:50%, top:49%  = (105mm, 145.5mm)
  ★ QRコードはJavaScriptで自動生成（ファイル不要）
  ★ URLはbody末尾の var QR_URL で変更
*/
.qr-wrap {
  position: absolute; left: 50%; top: 49%;
  transform: translate(-50%,-50%);
  display: flex; flex-direction: column;
  align-items: center; z-index: 20;
}
.qr-scan {
  font-family: 'Inter', Arial, sans-serif;
  font-size: 6.5px; font-weight: 700;
  letter-spacing: 5.5px; color: var(--g);
  margin-bottom: 5px; opacity: .85;
}
/* 7層ゴールドグロー */
.qr-card {
  border: 5px solid var(--g);
  border-radius: 18px;
  padding: 10px;
  background: #ffffff;
  box-shadow:
    0 0   0px  2px   rgba(212,168,67,.55),
    0 0  22px  0px   rgba(212,168,67,1),
    0 0  55px  0px   rgba(212,168,67,.92),
    0 0  110px 0px   rgba(212,168,67,.65),
    0 0  175px 0px   rgba(212,168,67,.38),
    0 0  260px 0px   rgba(212,168,67,.18),
    0 0  360px 0px   rgba(212,168,67,.08);
}


/* ══ AI導入（バブル間・三角構図） ══════ */
/*
  lower バブル中心: top=70.0% = y=207.9mm
  AI導入ブロック: top=72.5% = y=215.3mm（バブル中心のやや下）
  横: 左バブル x=69mm、右バブル x=141mm → 中央 x=105mm
*/
.ai-block {
  position: absolute; left: 50%; top: 72.5%;
  transform: translateX(-50%);
  text-align: center; z-index: 22;
  white-space: nowrap; line-height: 1;
}
.ai-text { display: block; font-size: 0; line-height: 1; }
.ai-ai {
  font-size: 46px; font-weight: 900;
  color: var(--g); letter-spacing: 4px;
  text-shadow:
    0 0 12px rgba(212,168,67,1),
    0 0 30px rgba(212,168,67,.95),
    0 0 70px rgba(212,168,67,.65),
    0 0 140px rgba(212,168,67,.32);
}
.ai-nyu {
  font-size: 38px; font-weight: 900;
  color: #fff; letter-spacing: 6px;
  text-shadow:
    0 0 10px rgba(212,168,67,.65),
    0 0 28px rgba(212,168,67,.38),
    0 0 60px rgba(212,168,67,.18);
}
.ai-sub {
  display: block; margin-top: 7px;
  font-size: 8px; font-weight: 700;
  color: rgba(255,255,255,.45); letter-spacing: 4.5px;
}

/* ══ 放射状バブル（強化版） ══════════════
  QR中心: (105, 145.5)mm   バブル半径 R=72mm
  各バブル直径: 36mm（r=18mm）

  配置（60°等分）:
   0° 右:    x=177mm  y=145.5mm → left=84.3%, top=49.0%
  60° 右下:  x=141mm  y=207.9mm → left=67.1%, top=70.0%
 120° 左下:  x= 69mm  y=207.9mm → left=32.9%, top=70.0%
 180° 左:    x= 33mm  y=145.5mm → left=15.7%, top=49.0%
 240° 左上:  x= 69mm  y= 83.1mm → left=32.9%, top=28.0%
 300° 右上:  x=141mm  y= 83.1mm → left=67.1%, top=28.0%
══════════════════════════════════════════ */
.bbl {
  position: absolute;
  transform: translate(-50%,-50%);
  z-index: 15;
  width: 36mm; height: 36mm; border-radius: 50%;
  background:
    radial-gradient(circle at 38% 28%,
      rgba(62,47,12,.99) 0%,
      rgba(28,20,4,.99)  45%,
      rgba(7,5,1,1)      100%);
  border: 2.5px solid rgba(212,168,67,.82);
  box-shadow:
    0 0   0px  1.5px rgba(212,168,67,.42),
    0 0  16px  0px   rgba(212,168,67,1),
    0 0  36px  0px   rgba(212,168,67,.78),
    0 0  72px  0px   rgba(212,168,67,.46),
    0 0  120px 0px   rgba(212,168,67,.22),
    inset 0 0  22px  rgba(212,168,67,.18);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; gap: 3.5px;
  padding: 0 2.5mm;
}
.bbl-ic {
  font-size: 21px; line-height: 1;
  filter: drop-shadow(0 0 9px rgba(212,168,67,.90));
}
.bbl-tx {
  font-size: 12.5px; font-weight: 900;
  color: #fff; letter-spacing: .2px; line-height: 1.15;
}
.bbl-st {
  font-size: 7px; font-weight: 700;
  color: var(--g); letter-spacing: .1px; line-height: 1.55;
}

/* ══ CTAボタン ═══════════════════════════ */
.cta {
  position: absolute; left: 50%; bottom: 19mm;
  transform: translateX(-50%);
  z-index: 25;
  display: inline-flex; align-items: center; gap: 9px;
  padding: 12px 30px 12px 22px;
  background: linear-gradient(135deg,
    var(--g3) 0%, var(--g) 28%, var(--g2) 58%, var(--g) 100%);
  color: #1a0d00;
  font-size: 15px; font-weight: 900;
  border-radius: 50px; white-space: nowrap; letter-spacing: .5px;
  box-shadow:
    0 0  30px rgba(212,168,67,.90),
    0 0  75px rgba(212,168,67,.40),
    0 5px 26px rgba(0,0,0,.78);
}
.cta-qr {
  width: 7mm; height: 7mm; border-radius: 2px;
  background: rgba(26,13,0,.75); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
}

/* ── フッター ─────────────────────── */
.foot {
  position: absolute; bottom: 9mm; left: 0; right: 0;
  text-align: center; z-index: 20;
  font-family: 'Inter', Arial, sans-serif;
  font-size: 5.5px; font-weight: 700;
  color: rgba(212,168,67,.32); letter-spacing: 5px;
  text-transform: uppercase;
}

</style>
</head>
<body>
<div class="page">

  <div class="gl gl-t"></div>
  <div class="gl gl-b"></div>
  <div class="ck ck-tl"></div><div class="ck ck-tr"></div>
  <div class="ck ck-bl"></div><div class="ck ck-br"></div>

  <!--
  ╔══════════════════════════════════════════════════╗
  ║  SVG 放射構造  viewBox="0 0 210 297" (mm単位)   ║
  ║  QR中心: (105, 145.5)mm  top:49%               ║
  ║  バブル半径 R=72mm / 60°等分                     ║
  ║   0° 右    (177,   145.5)                       ║
  ║  60° 右下  (141,   207.9) sin60°=0.866         ║
  ║ 120° 左下  ( 69,   207.9)                       ║
  ║ 180° 左    ( 33,   145.5)                       ║
  ║ 240° 左上  ( 69,    83.1)                       ║
  ║ 300° 右上  (141,    83.1)                       ║
  ╚══════════════════════════════════════════════════╝
  -->
  <svg class="svgl" viewBox="0 0 210 297" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- 放射グラデ: QR端で明るく → 外側でフェード -->
      <radialGradient id="rg" cx="50%" cy="49%" r="36%"
          gradientUnits="userSpaceOnUse">
        <stop offset="0%"   stop-color="#d4a843" stop-opacity="0.0"/>
        <stop offset="32%"  stop-color="#d4a843" stop-opacity="0.92"/>
        <stop offset="68%"  stop-color="#d4a843" stop-opacity="0.52"/>
        <stop offset="100%" stop-color="#d4a843" stop-opacity="0.10"/>
      </radialGradient>
    </defs>

    <!-- ■ 同心円 5層（内→外でフェード） -->
    <circle cx="105" cy="145.5" r="46"
      fill="none" stroke="rgba(212,168,67,0.34)" stroke-width="0.85"/>
    <circle cx="105" cy="145.5" r="67"
      fill="none" stroke="rgba(212,168,67,0.16)" stroke-width="0.58"
      stroke-dasharray="2.5 4"/>
    <circle cx="105" cy="145.5" r="92"
      fill="none" stroke="rgba(212,168,67,0.065)" stroke-width="0.45"
      stroke-dasharray="2 5.5"/>
    <circle cx="105" cy="145.5" r="118"
      fill="none" stroke="rgba(212,168,67,0.028)" stroke-width="0.38"
      stroke-dasharray="1.5 8"/>
    <circle cx="105" cy="145.5" r="145"
      fill="none" stroke="rgba(212,168,67,0.012)" stroke-width="0.30"
      stroke-dasharray="1 11"/>

    <!-- ■ 6方向 放射破線 (r=47mm → r=67mm)
         各方向: 内端=QR枠外, 外端=バブル直前             -->

    <!-- 0° 右  cos=1, sin=0 -->
    <line x1="152" y1="145.5" x2="172" y2="145.5"
      stroke="url(#rg)" stroke-width="1.5" stroke-dasharray="3 2"/>

    <!-- 60° 右下  cos=0.5, sin=0.866
         r47: (105+23.5, 145.5+40.7)=(128.5, 186.2)
         r67: (105+33.5, 145.5+58.0)=(138.5, 203.5) -->
    <line x1="128.5" y1="186.2" x2="138.5" y2="203.5"
      stroke="url(#rg)" stroke-width="1.5" stroke-dasharray="3 2"/>

    <!-- 120° 左下  cos=-0.5, sin=0.866 -->
    <line x1="81.5" y1="186.2" x2="71.5" y2="203.5"
      stroke="url(#rg)" stroke-width="1.5" stroke-dasharray="3 2"/>

    <!-- 180° 左  cos=-1, sin=0 -->
    <line x1="58" y1="145.5" x2="38" y2="145.5"
      stroke="url(#rg)" stroke-width="1.5" stroke-dasharray="3 2"/>

    <!-- 240° 左上  cos=-0.5, sin=-0.866 -->
    <line x1="81.5" y1="104.8" x2="71.5" y2="87.5"
      stroke="url(#rg)" stroke-width="1.5" stroke-dasharray="3 2"/>

    <!-- 300° 右上  cos=0.5, sin=-0.866 -->
    <line x1="128.5" y1="104.8" x2="138.5" y2="87.5"
      stroke="url(#rg)" stroke-width="1.5" stroke-dasharray="3 2"/>

    <!-- ■ バブル到達点ドット（r=70mm） -->
    <!-- 0°   (175, 145.5) -->
    <circle cx="175"   cy="145.5" r="3.5" fill="#d4a843" opacity="0.95"/>
    <!-- 60°  (105+35=140, 145.5+60.6=206.1) -->
    <circle cx="140"   cy="206.1" r="3.5" fill="#d4a843" opacity="0.95"/>
    <!-- 120° (70, 206.1) -->
    <circle cx="70"    cy="206.1" r="3.5" fill="#d4a843" opacity="0.95"/>
    <!-- 180° (35, 145.5) -->
    <circle cx="35"    cy="145.5" r="3.5" fill="#d4a843" opacity="0.95"/>
    <!-- 240° (70, 84.9) -->
    <circle cx="70"    cy="84.9"  r="3.5" fill="#d4a843" opacity="0.95"/>
    <!-- 300° (140, 84.9) -->
    <circle cx="140"   cy="84.9"  r="3.5" fill="#d4a843" opacity="0.95"/>
  </svg>

  <!-- ヘッダー -->
  <div class="hdr">
    <div class="hdr-badge">TEZU INTELLIGENCE &nbsp;｜&nbsp; AI 業務効率化</div>
    <div class="hdr-main">
      忙しいのに儲からない理由、<span class="hl">分かりますか？</span>
    </div>
  </div>

  <!-- QR上コピー -->
  <div class="sub">
    <div class="sub-ja">30秒で、あなたの<em>"無駄な時間"</em>を診断</div>
  </div>

  <!-- QRグロー（背景光） -->
  <div class="qr-glow"></div>

  <!--
    ════════════════════════════════════════════════
    QR コード ── 絶対的主役
    ★ JavaScriptで自動生成（ファイル不要・確実表示）
    ★ URLはbody末尾の var QR_URL で変更可能
    ════════════════════════════════════════════════
  -->
  <div class="qr-wrap">
    <div class="qr-scan">▶ &nbsp; SCAN ME &nbsp; ◀</div>
    <div class="qr-card">
