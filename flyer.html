<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TEZUIntelligence | AI業務診断</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&family=Inter:wght@700;900&display=swap" rel="stylesheet">
<style>

/* ══ 印刷設定 ══════════════════════════════════ */
@page { size: A4 portrait; margin: 0; }
@media print {
  html, body { width: 210mm; height: 297mm; background: none; }
  .flyer { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root { --g: #d6a451; --g2: #f0c46a; --bk: #0c0c0c; }
html { background: #3a3a3a; }
body { width: 210mm; margin: 0 auto;
       font-family: 'Noto Sans JP','Hiragino Kaku Gothic ProN','Meiryo',sans-serif; }

/* ── チラシ本体 ── */
.flyer { width: 210mm; height: 297mm; background: var(--bk); position: relative; overflow: hidden; }

/* ── ゴールドバー ── */
.bar-top    { position: absolute; top: 0; left: 0; right: 0; height: 5px;
              background: linear-gradient(90deg, var(--g), var(--g2), var(--g)); }
.bar-bottom { position: absolute; bottom: 0; left: 0; right: 0; height: 5px;
              background: linear-gradient(90deg, var(--g), var(--g2), var(--g)); }

/* ── コーナー装飾 ── */
.corner { position: absolute; width: 12mm; height: 12mm;
          border-color: rgba(214,164,81,.4); border-style: solid; }
.tl { top: 7mm; left: 7mm;   border-width: 1.2px 0 0 1.2px; }
.tr { top: 7mm; right: 7mm;  border-width: 1.2px 1.2px 0 0; }
.bl { bottom: 7mm; left: 7mm;  border-width: 0 0 1.2px 1.2px; }
.br { bottom: 7mm; right: 7mm; border-width: 0 1.2px 1.2px 0; }

/* ══ ヘッダー ══════════════════════════════════ */
.hdr {
  position: absolute; top: 11mm; left: 0; right: 0;
  text-align: center; padding: 0 20mm;
}
.eyebrow {
  font-size: 7.5px; letter-spacing: 4px; color: var(--g);
  font-weight: 700; margin-bottom: 9px;
  font-family: 'Inter','Arial',sans-serif;
}
.catch {
  font-size: 21px; font-weight: 900; color: #fff;
  line-height: 1.25; letter-spacing: -.3px;
}
.catch .acc { color: var(--g); }
.catch .ul  { border-bottom: 2.5px solid var(--g); padding-bottom: 1px; }
.sub {
  margin-top: 7px; font-size: 9.5px;
  color: rgba(255,255,255,.38); letter-spacing: .8px;
}

/* ══ SVGオーバーレイ ══════════════════════════ */
.svg-layer {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%; pointer-events: none;
}

/* ══ QR上の大見出し ══════════════════════════ */
/* 配置: QR-wrap top:57% の直上 */
.qr-headline {
  position: absolute; left: 50%; top: 41.5%;
  transform: translate(-50%, -100%);
  text-align: center; z-index: 10;
  width: 170mm; padding-bottom: 6mm;
}
.qr-hl-label {
  display: block; font-size: 8.5px; font-weight: 700;
  color: rgba(255,255,255,.35); letter-spacing: 3px;
  margin-bottom: 7px;
  font-family: 'Inter','Arial',sans-serif;
}
.qr-hl-main {
  display: block; font-size: 21px; font-weight: 900;
  color: #fff; line-height: 1.28; letter-spacing: -.2px;
}
.qr-hl-main em {
  color: var(--g); font-style: normal;
  border-bottom: 2.5px solid var(--g); padding-bottom: 1px;
}

/* ══ QRグロー ══════════════════════════════════ */
.qr-glow {
  position: absolute; left: 50%; top: 57%;
  transform: translate(-50%, -50%);
  width: 115mm; height: 115mm; border-radius: 50%;
  background: radial-gradient(circle, rgba(214,164,81,.25) 0%, transparent 62%);
  pointer-events: none; z-index: 5;
}

/* ══ QR本体 ═══════════════════════════════════ */
.qr-wrap {
  position: absolute; left: 50%; top: 57%;
  transform: translate(-50%, -50%);
  z-index: 10; text-align: center;
}
.qr-scan-label {
  display: block; font-size: 9px; font-weight: 700;
  color: rgba(255,255,255,.38); letter-spacing: 2.5px;
  margin-bottom: 8px;
  font-family: 'Inter','Arial',sans-serif;
}
.qr-frame {
  display: inline-block;
  border: 5px solid var(--g);
  border-radius: 16px; padding: 10px;
  background: #fff;
  box-shadow:
    0 0 0 1px rgba(214,164,81,.35),
    0 0 16px rgba(214,164,81,1),
    0 0 36px rgba(214,164,81,.75),
    0 0 70px rgba(214,164,81,.5),
    0 0 120px rgba(214,164,81,.28),
    0 0 180px rgba(214,164,81,.12);
}
.qr-frame img {
  width: 75mm; height: 75mm; display: block; border-radius: 6px;
}
.qr-free {
  display: block; margin-top: 10px;
  font-size: 13px; font-weight: 900;
  color: var(--g); letter-spacing: 2.5px;
}
.qr-note {
  display: block; margin-top: 5px;
  font-size: 8px; color: rgba(255,255,255,.2);
  letter-spacing: 1.5px;
}

/* ══ 3アイテム ═════════════════════════════════ */
.it {
  position: absolute; transform: translate(-50%, -50%);
  display: flex; flex-direction: column;
  align-items: center; text-align: center; z-index: 10;
}
.it-icon { font-size: 36px; line-height: 1; margin-bottom: 6px; }
.it-lbl  { font-size: 18px; font-weight: 900; color: #fff;
            white-space: nowrap; line-height: 1.1; }
.it-en   { font-size: 8px; font-weight: 700;
            color: rgba(214,164,81,.4); letter-spacing: 1.5px;
            margin-top: 5px; font-family: 'Inter','Arial',sans-serif; }

/* ══ CTA ══════════════════════════════════════ */
.cta { position: absolute; bottom: 9mm; left: 0; right: 0; text-align: center; }
.cta-btn {
  display: inline-block;
  background: linear-gradient(135deg, var(--g), var(--g2) 50%, var(--g));
  color: #000; font-size: 16px; font-weight: 900;
  padding: 14px 44px; border-radius: 40px;
  letter-spacing: .5px; margin-bottom: 8px;
  box-shadow: 0 0 28px rgba(214,164,81,.55), 0 4px 16px rgba(0,0,0,.4);
}
.cta-co {
  font-size: 7px; color: rgba(255,255,255,.22);
  letter-spacing: 3px; font-family: 'Inter','Arial',sans-serif;
}

</style>
</head>
<body>

  <!-- ゴールドバー -->
  <div class="bar-top"></div>
  <div class="bar-bottom"></div>

    <circle cx="183" cy="169" r="2.6" fill="#d6a451" opacity="0.95"/>
    <circle cx="105" cy="247" r="2.6" fill="#d6a451" opacity="0.95"/>
