<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TEZU Intelligence | AI業務診断</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&family=Inter:wght@700;900&display=swap" rel="stylesheet">
<style>

/* ══ 印刷設定 ════════════════════════════ */
@page { size: 210mm 297mm; margin: 0; }
@media print {
  html, body { width: 210mm; height: 297mm; }
  .page { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --g:  #d4a843;
  --g2: #ffe680;
  --g3: #7a5510;
  --g4: #fff0a0;
  --bk: #050505;
}

html { background: #1a1a1a; }
body {
  width: 210mm; margin: 0 auto;
  font-family: 'Noto Sans JP','Hiragino Kaku Gothic ProN','Meiryo',sans-serif;
}

/* ══ チラシ本体 ══════════════════════════ */
.page {
  width: 210mm; height: 297mm;
  background: var(--bk);
  position: relative; overflow: hidden;
}

/* ── ゴールドライン上下 ── */
.gl {
  position: absolute; left: 0; right: 0; height: 6px; z-index: 40;
  background: linear-gradient(90deg,
    transparent 0%,
    var(--g3) 5%,
    var(--g)  18%,
    var(--g2) 38%,
    var(--g4) 50%,
    var(--g2) 62%,
    var(--g)  82%,
    var(--g3) 95%,
    transparent 100%);
  box-shadow: 0 0 12px rgba(255,224,80,.80), 0 0 30px rgba(212,168,67,.45);
}
.gl-t { top: 0; }
.gl-b { bottom: 0; }

/* ── コーナーブラケット ── */
.ck {
  position: absolute; z-index: 40;
  width: 13mm; height: 13mm;
  border-color: rgba(212,168,67,.48); border-style: solid;
}
.ck-tl { top:8mm; left:8mm;    border-width:2px 0 0 2px; }
.ck-tr { top:8mm; right:8mm;   border-width:2px 2px 0 0; }
.ck-bl { bottom:8mm; left:8mm;  border-width:0 0 2px 2px; }
.ck-br { bottom:8mm; right:8mm; border-width:0 2px 2px 0; }

/* ══ SVG 同心円レイヤー（装飾のみ） ════ */
.svgl {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 2;
}

/* ══ ヘッダー ═══════════════════════════ */
.hdr {
  position: absolute; top: 11mm; left: 0; right: 0;
  text-align: center; padding: 0 14mm; z-index: 20;
}
.hdr-badge {
  font-family: 'Inter', Arial, sans-serif;
  font-size: 6.5px; font-weight: 700; letter-spacing: 4px;
  color: rgba(212,168,67,.75); text-transform: uppercase;
  margin-bottom: 9px;
}
.hdr-main {
  font-size: 21px; font-weight: 900;
  color: #fff; line-height: 1.28; letter-spacing: -.3px;
}
.hdr-main .hl {
  color: var(--g2);
  text-shadow:
    0 0 8px rgba(255,230,100,1),
    0 0 20px rgba(212,168,67,.9),
    0 0 45px rgba(212,168,67,.5);
}

/* ── QR上コピー ── */
.sub {
  position: absolute; top: 30mm; left: 0; right: 0;
  text-align: center; padding: 0 12mm; z-index: 20;
}
.sub-ja {
  font-size: 17px; font-weight: 900;
  color: #fff; line-height: 1.32; letter-spacing: -.2px;
}
.sub-ja em {
  font-style: normal; color: var(--g2);
  border-bottom: 2px solid rgba(255,230,100,.8); padding-bottom: 1px;
  text-shadow:
    0 0 6px rgba(255,230,100,1),
    0 0 18px rgba(212,168,67,.8);
}

/* ══ QRグロー（背景光） ═══════════ */
.qr-glow {
  position: absolute; left: 50%; top: 49%;
  transform: translate(-50%,-50%);
  width: 160mm; height: 160mm; border-radius: 50%;
  background: radial-gradient(circle,
    rgba(255,230,100,.55) 0%,
    rgba(212,168,67,.32)  22%,
    rgba(212,168,67,.14)  44%,
    rgba(212,168,67,.05)  60%,
    transparent 72%);
  pointer-events: none; z-index: 3;
}

/* ══ QRコード ════════════════════════ */
.qr-wrap {
  position: absolute; left: 50%; top: 49%;
  transform: translate(-50%,-50%);
  display: flex; flex-direction: column;
  align-items: center; z-index: 20;
}
.qr-scan {
  font-family: 'Inter', Arial, sans-serif;
  font-size: 6.5px; font-weight: 700;
  letter-spacing: 5.5px; color: var(--g);
  margin-bottom: 5px; opacity: .85;
}
.qr-card {
  border: 5px solid var(--g);
  border-radius: 18px;
  padding: 10px;
  background: #ffffff;
  box-shadow:
    0 0   0px  2px   rgba(212,168,67,.55),
    0 0  22px  0px   rgba(212,168,67,1),
    0 0  55px  0px   rgba(212,168,67,.92),
    0 0  110px 0px   rgba(212,168,67,.65),
    0 0  175px 0px   rgba(212,168,67,.38),
    0 0  260px 0px   rgba(212,168,67,.18),
    0 0  360px 0px   rgba(212,168,67,.08);
}

/* ══ AI導入 ══════════════════════════ */
.ai-block {
  position: absolute; left: 50%; top: 72.5%;
  transform: translateX(-50%);
  text-align: center; z-index: 22;
  white-space: nowrap; line-height: 1;
}
.ai-text { display: block; font-size: 0; line-height: 1; }
.ai-ai {
  font-size: 136px; font-weight: 900;
  background: linear-gradient(170deg,
    #fffbe0 0%, #ffe840 30%, #f5c500 60%, #ffe040 85%, #fff5a0 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 5px;
  filter:
    drop-shadow(-2px -2px 0px rgba(0,0,0,.98))
    drop-shadow( 2px -2px 0px rgba(0,0,0,.98))
    drop-shadow(-2px  2px 0px rgba(0,0,0,.98))
    drop-shadow( 2px  2px 0px rgba(0,0,0,.98))
    drop-shadow(0 0  8px rgba(255,220,0,1))
    drop-shadow(0 0 20px rgba(212,168,67,.85));
}
.ai-nyu {
  font-size: 110px; font-weight: 900;
  color: #ffffff; letter-spacing: 7px;
  text-shadow:
    -2px -2px 0 rgba(0,0,0,.98),
     2px -2px 0 rgba(0,0,0,.98),
    -2px  2px 0 rgba(0,0,0,.98),
     2px  2px 0 rgba(0,0,0,.98),
     0px  0px 0 rgba(0,0,0,.98),
    0 0  9px rgba(255,240,120,1),
    0 0 24px rgba(212,168,67,.85),
    0 0 55px rgba(212,168,67,.50);
}

/* ══════════════════════════════════════════════
   放射レイ（CSS rotate方式・確実表示）
   ──────────────────────────────────────────────
   原理: QR中心に width=0 height=0 のハブを置き、
         そこから 72mm の水平バーを回転させる。
         グラデーションで QR内=透明、ギャップ=金発光、
         バブル入口=フェードアウト を表現。
   z-index 10: バブル(15)より下、QR(20)より下
   ══════════════════════════════════════════════ */
.ray-hub {
  position: absolute;
  left: 50%; top: 49%;     /* QR中心に配置 */
  width: 0; height: 0;
  z-index: 10;
  pointer-events: none;
}

/* ── 放射レイ共通スタイル ── */
.ray {
  position: absolute;
  left: 0; top: 0;
  width: 72mm;             /* QR中心 → バブル中心 */
  height: 5px;
  transform-origin: 0 50%; /* 左端（=QR中心）を軸に回転 */

  /*
    グラデーション設定（左=QR中心、右=バブル中心）
    0%〜57%  : QRカード下・透明
    57%〜63% : QRエッジ付近でフェードイン
    63%〜76% : ギャップ中央・最大輝度（ここが主役）
    76%〜90% : バブルへ向かってフェード
    90%〜100%: バブル内・消滅
  */
  background: linear-gradient(to right,
    rgba(255,230,80, 0.00)  0%,
    rgba(255,230,80, 0.00) 57%,
    rgba(255,250,180,0.75) 61%,
    rgba(255,235,80, 1.00) 67%,
    rgba(255,210,50, 1.00) 74%,
    rgba(212,168,67, 0.70) 83%,
    rgba(180,130,40, 0.15) 93%,
    rgba(180,130,40, 0.00) 100%
  );

  /* ゴールドグロー（drop-shadowはグラデ形状に追従） */
  filter:
    drop-shadow(0 0  4px rgba(255,215,40,0.95))
    drop-shadow(0 0 10px rgba(255,190,20,0.60))
    drop-shadow(0 0 22px rgba(212,168,67,0.30));
}

/* ── ハロー層（同じ形・太め・低透明度でグロー感を増幅） ── */
.ray::before {
  content: '';
  position: absolute;
  left: 0; right: 0;
  top: -7px; bottom: -7px; /* 上下に広げてソフトグロー */
  background: inherit;
  opacity: 0.22;
}

/* ── 6方向 ── */
.r0   { transform: translateY(-50%) rotate(0deg);   }
.r60  { transform: translateY(-50%) rotate(60deg);  }
.r120 { transform: translateY(-50%) rotate(120deg); }
.r180 { transform: translateY(-50%) rotate(180deg); }
.r240 { transform: translateY(-50%) rotate(240deg); }
.r300 { transform: translateY(-50%) rotate(300deg); }

/* ══════════════════════════════════════════════
   接続ドット
   ──────────────────────────────────────────────
   QR端ドット (r≈47mm) と ノード端ドット (r≈70mm) に
   発光点を置いて「接続感」を強化する
   ══════════════════════════════════════════════ */
/* QR端ドット（小・白金） */
.cdot-qr {
  position: absolute;
  transform: translate(-50%,-50%);
  width: 7px; height: 7px;
  border-radius: 50%;
  background: radial-gradient(circle, #ffffff 25%, #fffbe0 60%, #ffe840 100%);
  z-index: 11;
  pointer-events: none;
  box-shadow:
    0 0  5px rgba(255,240,100,1),
    0 0 12px rgba(255,210,40,0.90),
    0 0 25px rgba(212,168,67,0.55);
}
/* ノード端ドット（大・ゴールド） */
.cdot-nd {
  position: absolute;
  transform: translate(-50%,-50%);
  width: 11px; height: 11px;
  border-radius: 50%;
  background: radial-gradient(circle, #ffffff 20%, #ffe840 50%, #d4a843 100%);
  z-index: 11;
  pointer-events: none;
  box-shadow:
    0 0  6px rgba(255,240,100,1),
    0 0 16px rgba(255,210,40,0.95),
    0 0 35px rgba(212,168,67,0.65),
    0 0 60px rgba(212,168,67,0.30);
}

/* ══ 放射状バブル ════════════════════════════ */
.bbl {
  position: absolute;
  transform: translate(-50%,-50%);
  z-index: 15;
  width: 60mm; height: 60mm; border-radius: 50%;
  overflow: hidden;
  background:
    radial-gradient(circle at 32% 22%,
      rgba(255,230,100,.20) 0%,
      transparent           38%),
    radial-gradient(circle at 50% 50%,
      rgba(70,52,12,1) 0%,
      rgba(30,22,4,1)  55%,
      rgba(6,5,1,1)    100%);
  border: 3.5px solid rgba(255,228,70,.98);
  outline: 1.5px solid rgba(255,200,40,.45);
  box-shadow:
    0 0   0px   3px  rgba(255,245,120,.70),
    0 0  20px   0px  rgba(255,228,30,1),
    0 0  48px   0px  rgba(212,168,67,.95),
    0 0  95px   0px  rgba(212,168,67,.65),
    0 0  160px  0px  rgba(212,168,67,.36),
    0 0  240px  0px  rgba(212,168,67,.16),
    inset 0 0   12px rgba(255,230,80,.32),
    inset 0 -8px 20px rgba(90,60,8,.65);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; gap: 2px;
  padding: 0 5mm;
}
.bbl-ic {
  font-size: 18px; line-height: 1;
  filter:
    drop-shadow(0 0 6px rgba(255,230,60,1))
    drop-shadow(0 0 14px rgba(212,168,67,.85));
}
.bbl-tx {
  font-size: 34px; font-weight: 900;
  color: #ffffff;
  white-space: nowrap;
  letter-spacing: -1px;
  line-height: 1;
  text-shadow:
    -2px -2px 0 rgba(0,0,0,.95),
     2px -2px 0 rgba(0,0,0,.95),
    -2px  2px 0 rgba(0,0,0,.95),
     2px  2px 0 rgba(0,0,0,.95),
    0 0  8px rgba(255,240,100,1),
    0 0 22px rgba(212,168,67,.92),
    0 0 45px rgba(212,168,67,.55);
}
.bbl-st {
  font-size: 9px; font-weight: 900;
  color: #ffe680;
  letter-spacing: .1px; line-height: 1.4;
  white-space: nowrap;
  text-shadow:
    0 0 4px rgba(255,230,80,1),
    0 0 10px rgba(212,168,67,.75);
}

/* 上部2ノード：1.18倍スケール */
.bbl-top {
  transform: translate(-50%,-50%) scale(1.18);
  box-shadow:
    0 0   0px   4px  rgba(255,248,140,.80),
    0 0  24px   0px  rgba(255,235,30,1),
    0 0  58px   0px  rgba(212,168,67,1),
    0 0  110px  0px  rgba(212,168,67,.75),
    0 0  175px  0px  rgba(212,168,67,.45),
    0 0  250px  0px  rgba(212,168,67,.20),
    inset 0 0   16px rgba(255,240,100,.40),
    inset 0 -8px 20px rgba(90,60,8,.65);
}

/* ══ CTAボタン ═══════════════════════════ */
.cta {
  position: absolute; left: 50%; bottom: 19mm;
  transform: translateX(-50%);
  z-index: 25;
  display: inline-flex; align-items: center; gap: 9px;
  padding: 12px 30px 12px 22px;
  background: linear-gradient(135deg,
    var(--g3) 0%, var(--g) 20%, var(--g2) 45%, var(--g4) 58%, var(--g2) 72%, var(--g) 100%);
  color: #1a0d00;
  font-size: 15px; font-weight: 900;
  border-radius: 50px; white-space: nowrap; letter-spacing: .5px;
  box-shadow:
    0 0  30px rgba(212,168,67,.90),
    0 0  75px rgba(212,168,67,.40),
    0 5px 26px rgba(0,0,0,.78);
}
.cta-qr {
  width: 7mm; height: 7mm; border-radius: 2px;
  background: rgba(26,13,0,.75); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
}

/* ── フッター ─────────────────────── */
.foot {
  position: absolute; bottom: 9mm; left: 0; right: 0;
  text-align: center; z-index: 20;
  font-family: 'Inter', Arial, sans-serif;
  font-size: 5.5px; font-weight: 700;
  color: rgba(212,168,67,.32); letter-spacing: 5px;
  text-transform: uppercase;
}

</style>
</head>
<body>
<div class="page">

  <div class="gl gl-t"></div>
  <div class="gl gl-b"></div>
  <div class="ck ck-tl"></div><div class="ck ck-tr"></div>
  <div class="ck ck-bl"></div><div class="ck ck-br"></div>

  <!--
  ╔══════════════════════════════════════════════════╗
  ║  SVG 同心円（装飾のみ）  viewBox="0 0 210 297"  ║
  ║  QR中心: (105, 145.5)mm                         ║
  ╚══════════════════════════════════════════════════╝
  -->
  <svg class="svgl" viewBox="0 0 210 297" xmlns="http://www.w3.org/2000/svg">
    <!-- 同心円 4層（奥行き感・装飾） -->
    <circle cx="105" cy="145.5" r="46"
      fill="none" stroke="rgba(255,224,80,0.35)" stroke-width="0.75"/>
    <circle cx="105" cy="145.5" r="67"
      fill="none" stroke="rgba(212,168,67,0.14)" stroke-width="0.55"
      stroke-dasharray="2.5 4"/>
    <circle cx="105" cy="145.5" r="92"
      fill="none" stroke="rgba(212,168,67,0.06)" stroke-width="0.42"
      stroke-dasharray="2 5.5"/>
    <circle cx="105" cy="145.5" r="118"
      fill="none" stroke="rgba(212,168,67,0.025)" stroke-width="0.32"
      stroke-dasharray="1.5 8"/>
  </svg>

  <!--
  ════════════════════════════════════════════════════════
  放射レイ（CSS rotate 方式）
  ─────────────────────────────────────────────────────
  QR中心 (left:50%, top:49%) にハブを置き、
  6方向に 72mm の発光バーを回転展開する。
  z-index:10 でバブル(15)・QR(20)の下に配置。
  ════════════════════════════════════════════════════════
  -->
  <div class="ray-hub">
    <div class="ray r0"></div>
    <div class="ray r60"></div>
    <div class="ray r120"></div>
    <div class="ray r180"></div>
    <div class="ray r240"></div>
    <div class="ray r300"></div>
  </div>

  <!--
  ════════════════════════════════════════════════════════
  接続ドット（QR端・ノード端）
  ─────────────────────────────────────────────────────
  QR端 r=47mm:
   0°  left=72.4% top=49.0%
  60°  left=61.2% top=62.5%
 120°  left=38.8% top=62.5%
 180°  left=27.6% top=49.0%
 240°  left=38.8% top=35.5%
 300°  left=61.2% top=35.5%

  ノード端 r=70mm:
   0°  left=83.3% top=49.0%
  60°  left=66.7% top=69.0%
 120°  left=33.3% top=69.0%
 180°  left=16.7% top=49.0%
 240°  left=33.3% top=28.6%
 300°  left=66.7% top=28.6%
  ════════════════════════════════════════════════════════
  -->

  <!-- QR端ドット (r=47mm) -->
  <div class="cdot-qr" style="left:72.4%;top:49.0%"></div>
  <div class="cdot-qr" style="left:61.2%;top:62.5%"></div>
  <div class="cdot-qr" style="left:38.8%;top:62.5%"></div>
  <div class="cdot-qr" style="left:27.6%;top:49.0%"></div>
  <div class="cdot-qr" style="left:38.8%;top:35.5%"></div>
  <div class="cdot-qr" style="left:61.2%;top:35.5%"></div>

  <!-- ノード端ドット (r=70mm) -->
  <div class="cdot-nd" style="left:83.3%;top:49.0%"></div>
  <div class="cdot-nd" style="left:66.7%;top:69.0%"></div>
  <div class="cdot-nd" style="left:33.3%;top:69.0%"></div>
  <div class="cdot-nd" style="left:16.7%;top:49.0%"></div>
  <div class="cdot-nd" style="left:33.3%;top:28.6%"></div>
  <div class="cdot-nd" style="left:66.7%;top:28.6%"></div>

  <!-- ヘッダー -->
  <div class="hdr">
    <div class="hdr-badge">TEZU INTELLIGENCE &nbsp;｜&nbsp; AI 業務効率化</div>
    <div class="hdr-main">
      忙しいのに儲からない理由、<span class="hl">分かりますか？</span>
    </div>
  </div>

  <!-- QR上コピー -->
  <div class="sub">
    <div class="sub-ja">30秒で、あなたの<em>"無駄な時間"</em>を診断</div>
  </div>

  <!-- QRグロー（背景光） -->
  <div class="qr-glow"></div>

  <!-- QR コード -->
  <div class="qr-wrap">
