<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TEZU Intelligence | AI業務診断</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&family=Inter:wght@700;900&display=swap" rel="stylesheet">
<style>

/* ══════════════════════════════════════════════
   印刷設定
══════════════════════════════════════════════ */
@page { size: A4 portrait; margin: 0; }
@media print {
  html, body { width: 210mm; height: 297mm; background: none; }
  .flyer { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ══════════════════════════════════════════════
   カラー変数
══════════════════════════════════════════════ */
:root {
  --g:   #d6a451;   /* メインゴールド */
  --g2:  #f0c46a;   /* ライトゴールド */
  --bk:  #090909;   /* 背景 */
}

html { background: #333; }
body {
  width: 210mm;
  margin: 0 auto;
  font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
}

/* ══════════════════════════════════════════════
   チラシ本体
══════════════════════════════════════════════ */
.flyer {
  width: 210mm;
  height: 297mm;
  background: var(--bk);
  position: relative;
  overflow: hidden;
}

/* ── 上下ゴールドライン ── */
.bar {
  position: absolute; left: 0; right: 0; height: 6px;
  background: linear-gradient(90deg, var(--g) 0%, var(--g2) 50%, var(--g) 100%);
}
.bar-top    { top: 0; }
.bar-bottom { bottom: 0; }

/* ── コーナー装飾 ── */
.corner {
  position: absolute; width: 14mm; height: 14mm;
  border-color: rgba(214,164,81,.38); border-style: solid;
}
.tl { top:8mm; left:8mm;   border-width: 1.5px 0 0 1.5px; }
.tr { top:8mm; right:8mm;  border-width: 1.5px 1.5px 0 0; }
.bl { bottom:8mm; left:8mm;  border-width: 0 0 1.5px 1.5px; }
.br { bottom:8mm; right:8mm; border-width: 0 1.5px 1.5px 0; }

/* ══════════════════════════════════════════════
   SVG 放射レイヤー
══════════════════════════════════════════════ */
.svg-layer {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 1;
}

/* ══════════════════════════════════════════════
   ヘッダーブロック
══════════════════════════════════════════════ */
.hdr {
  position: absolute; top: 12mm; left: 0; right: 0;
  text-align: center; padding: 0 16mm; z-index: 10;
}
.hdr-badge {
  font-family: 'Inter', Arial, sans-serif;
  font-size: 6.5px; font-weight: 700;
  color: var(--g); letter-spacing: 4px;
  text-transform: uppercase; margin-bottom: 9px;
}
.hdr-copy {
  font-size: 20px; font-weight: 900;
  color: #fff; line-height: 1.28; letter-spacing: -.4px;
}
.hdr-copy .acc { color: var(--g); }

/* ── QR上 コピーブロック ── */
.qr-copy {
  position: absolute; top: 31mm; left: 0; right: 0;
  text-align: center; padding: 0 14mm; z-index: 10;
}
.qr-copy-en {
  font-family: 'Inter', Arial, sans-serif;
  font-size: 6px; font-weight: 700;
  color: rgba(255,255,255,.22); letter-spacing: 3.5px;
  text-transform: uppercase; margin-bottom: 5px;
}
.qr-copy-ja {
  font-size: 19.5px; font-weight: 900;
  color: #fff; line-height: 1.28; letter-spacing: -.3px;
}
.qr-copy-ja em {
  color: var(--g); font-style: normal;
  border-bottom: 2.5px solid var(--g); padding-bottom: 1px;
}

/* ══════════════════════════════════════════════
   QR グロー背景
══════════════════════════════════════════════ */
.qr-glow {
  position: absolute; left: 50%; top: 52.5%;
  transform: translate(-50%, -50%);
  width: 124mm; height: 124mm; border-radius: 50%;
  background: radial-gradient(circle,
    rgba(214,164,81,.30) 0%,
    rgba(214,164,81,.10) 32%,
    rgba(214,164,81,.03) 52%,
    transparent 66%);
  pointer-events: none; z-index: 3;
}

/* ══════════════════════════════════════════════
   QR コード本体（主役）
══════════════════════════════════════════════ */
.qr-wrap {
  position: absolute; left: 50%; top: 52.5%;
  transform: translate(-50%, -50%);
  display: flex; flex-direction: column;
  align-items: center; z-index: 20;
}
.qr-scan {
  font-family: 'Inter', Arial, sans-serif;
  font-size: 6.5px; font-weight: 700;
  letter-spacing: 5px; color: var(--g);
  margin-bottom: 4px;
}
/* ゴールド発光フレーム 6層 */
.qr-frame {
  border: 5px solid var(--g);
  border-radius: 18px;
  padding: 10px;
  background: #fff;
  box-shadow:
    0 0 0 1px  rgba(214,164,81,.40),
    0 0 22px   rgba(214,164,81,1),
    0 0 54px   rgba(214,164,81,.90),
    0 0 110px  rgba(214,164,81,.62),
    0 0 170px  rgba(214,164,81,.34),
    0 0 250px  rgba(214,164,81,.15);
}
/* QR画像: 差し替える場合は src="" を変更するだけ */
.qr-frame img {
  width: 80mm; height: 80mm;
  display: block; border-radius: 5px;
  image-rendering: crisp-edges;
  image-rendering: pixelated;
}

/* ══════════════════════════════════════════════
   AI導入 ── QR直下の大訴求
══════════════════════════════════════════════ */
.ai-intro {
  position: absolute; left: 50%; top: 78%;
  transform: translateX(-50%);
  text-align: center; z-index: 22;
  white-space: nowrap;
}
.ai-intro-main {
  font-size: 36px; font-weight: 900;
  color: #fff; letter-spacing: 8px; line-height: 1;
  text-shadow:
    0 0 12px rgba(214,164,81,1),
    0 0 32px rgba(214,164,81,.90),
    0 0 70px rgba(214,164,81,.55),
    0 0 120px rgba(214,164,81,.28);
}
.ai-intro-main .gold {
  color: var(--g); font-size: 42px;
}
.ai-intro-sub {
  display: block; margin-top: 5px;
  font-size: 7px; font-weight: 700;
  color: rgba(255,255,255,.36); letter-spacing: 4px;
}

/* ══════════════════════════════════════════════
   放射状バブル（6個）
══════════════════════════════════════════════ */
.bbl {
  position: absolute;
  transform: translate(-50%, -50%);
  z-index: 15;
  /* 円形 */
  width: 29mm; height: 29mm;
  border-radius: 50%;
  /* 暗いグラデ背景 */
  background: radial-gradient(circle at 38% 32%,
    rgba(38,28,10,.97) 25%,
    rgba(8,7,5,.99)    100%);
  /* ゴールドボーダー + グロー */
  border: 1.6px solid rgba(214,164,81,.58);
  box-shadow:
    0 0 0   0.5px rgba(214,164,81,.18),
    0 0 10px      rgba(214,164,81,.42),
    0 0 24px      rgba(214,164,81,.20),
    inset 0 0 16px rgba(214,164,81,.06);
  /* 中央揃え */
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  padding: 2.5mm 1.5mm;
}
.bbl-icon {
  font-size: 17px; line-height: 1; margin-bottom: 3px;
  filter: drop-shadow(0 0 5px rgba(214,164,81,.55));
}
.bbl-lbl {
  font-size: 10.5px; font-weight: 900;
  color: #fff; line-height: 1.2; letter-spacing: .2px;
}
.bbl-sub {
  font-size: 5.5px; font-weight: 700;
  color: var(--g); letter-spacing: .3px;
  line-height: 1.4; margin-top: 3px;
}

/* ══════════════════════════════════════════════
   CTA ボタン
══════════════════════════════════════════════ */
.cta {
  position: absolute; left: 50%; bottom: 18mm;
  transform: translateX(-50%);
  background: linear-gradient(135deg, var(--g) 0%, var(--g2) 50%, var(--g) 100%);
  color: #000; font-weight: 900; font-size: 14px;
  padding: 11px 30px; border-radius: 50px;
  white-space: nowrap; letter-spacing: .5px;
  display: flex; align-items: center; gap: 6px;
  box-shadow:
    0 0 28px rgba(214,164,81,.82),
    0 0 68px rgba(214,164,81,.32),
    0 5px 20px rgba(0,0,0,.65);
  z-index: 25;
}
.cta-icon { font-size: 14px; }

/* ── フッター ── */
.footer {
  position: absolute; bottom: 9mm; left: 0; right: 0;
  text-align: center; z-index: 10;
  font-family: 'Inter', Arial, sans-serif;
  font-size: 6px; font-weight: 700;
  color: rgba(214,164,81,.36); letter-spacing: 4px;
  text-transform: uppercase;
}

</style>
</head>
<body>
<div class="flyer">

  <!-- 上下ゴールドライン -->
  <div class="bar bar-top"></div>
  <div class="bar bar-bottom"></div>

  <!-- コーナー装飾 -->
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <!--
  ════════════════════════════════════════════
  SVG 放射レイヤー
  QR中心: (105, 156)mm  ─ viewBox="0 0 210 297"(mm単位)
  バブル半径: r=68mm, 60°等分
    0°  右:   (173, 156)
    60° 右下:  (139, 214.9)
   120° 左下:  (71,  214.9)
   180° 左:   (37,  156)
   240° 左上:  (71,  97.1)
   300° 右上:  (139, 97.1)
  ════════════════════════════════════════════
  -->
  <svg class="svg-layer" viewBox="0 0 210 297" xmlns="http://www.w3.org/2000/svg">

    <!-- ■ 同心円(内→外で薄く): 広がり感の骨格 -->
    <circle cx="105" cy="156" r="46"
            fill="none" stroke="rgba(214,164,81,0.24)" stroke-width="0.65"/>
    <circle cx="105" cy="156" r="72"
            fill="none" stroke="rgba(214,164,81,0.10)" stroke-width="0.45"
            stroke-dasharray="2 3.5"/>
    <circle cx="105" cy="156" r="100"
            fill="none" stroke="rgba(214,164,81,0.048)" stroke-width="0.4"
            stroke-dasharray="1.5 5"/>
    <circle cx="105" cy="156" r="128"
            fill="none" stroke="rgba(214,164,81,0.020)" stroke-width="0.35"
            stroke-dasharray="1 7"/>

    <!-- ■ 6方向 放射破線 (r=47→r=63, バブルとQRをつなぐ) -->
    <!-- 0° 右  -->
    <line x1="152" y1="156"   x2="168" y2="156"
          stroke="#d6a451" stroke-width="0.85" stroke-dasharray="2.2 2" opacity="0.82"/>
    <!-- 60° 右下  cos=0.5 sin=0.866  -->
    <line x1="128.5" y1="196.7" x2="138" y2="213.7"
          stroke="#d6a451" stroke-width="0.85" stroke-dasharray="2.2 2" opacity="0.82"/>
    <!-- 120° 左下  cos=-0.5 sin=0.866 -->
    <line x1="81.5"  y1="196.7" x2="72"  y2="213.7"
          stroke="#d6a451" stroke-width="0.85" stroke-dasharray="2.2 2" opacity="0.82"/>
    <!-- 180° 左 -->
    <line x1="58"  y1="156"   x2="42"  y2="156"
          stroke="#d6a451" stroke-width="0.85" stroke-dasharray="2.2 2" opacity="0.82"/>
    <!-- 240° 左上  cos=-0.5 sin=-0.866 -->
    <line x1="81.5"  y1="115.3" x2="72"  y2="98.3"
          stroke="#d6a451" stroke-width="0.85" stroke-dasharray="2.2 2" opacity="0.82"/>
    <!-- 300° 右上  cos=0.5 sin=-0.866 -->
    <line x1="128.5" y1="115.3" x2="138" y2="98.3"
          stroke="#d6a451" stroke-width="0.85" stroke-dasharray="2.2 2" opacity="0.82"/>

    <!-- ■ 中間角ティックマーク (30/90/150/210/270/330°, r=52→59) -->
    <!-- 30°  cos=0.866 sin=0.5 -->
    <line x1="150.0" y1="182.0" x2="156.1" y2="185.5"
          stroke="#d6a451" stroke-width="0.55" opacity="0.36"/>
    <!-- 90° -->
    <line x1="105"   y1="208"   x2="105"   y2="215"
          stroke="#d6a451" stroke-width="0.55" opacity="0.36"/>
    <!-- 150°  cos=-0.866 sin=0.5 -->
    <line x1="60.0"  y1="182.0" x2="53.9"  y2="185.5"
          stroke="#d6a451" stroke-width="0.55" opacity="0.36"/>
    <!-- 210°  cos=-0.866 sin=-0.5 -->
    <line x1="60.0"  y1="130.0" x2="53.9"  y2="126.5"
          stroke="#d6a451" stroke-width="0.55" opacity="0.36"/>
    <!-- 270° -->
    <line x1="105"   y1="104"   x2="105"   y2="97"
          stroke="#d6a451" stroke-width="0.55" opacity="0.36"/>
    <!-- 330°  cos=0.866 sin=-0.5 -->
    <line x1="150.0" y1="130.0" x2="156.1" y2="126.5"
          stroke="#d6a451" stroke-width="0.55" opacity="0.36"/>

    <!-- ■ 端点ドット (r=65, バブル到達点を示す) -->
    <!-- 0°   (170,156) -->
    <circle cx="170"   cy="156"   r="2.5" fill="#d6a451" opacity="0.90"/>
    <!-- 60°  (105+32.5=137.5, 156+56.3=212.3) -->
    <circle cx="137.5" cy="212.3" r="2.5" fill="#d6a451" opacity="0.90"/>
    <!-- 120° (72.5, 212.3) -->
    <circle cx="72.5"  cy="212.3" r="2.5" fill="#d6a451" opacity="0.90"/>
    <!-- 180° (40, 156) -->
    <circle cx="40"    cy="156"   r="2.5" fill="#d6a451" opacity="0.90"/>
    <!-- 240° (72.5, 99.7) -->
    <circle cx="72.5"  cy="99.7"  r="2.5" fill="#d6a451" opacity="0.90"/>
    <!-- 300° (137.5, 99.7) -->
    <circle cx="137.5" cy="99.7"  r="2.5" fill="#d6a451" opacity="0.90"/>

  </svg>

  <!-- ヘッダー -->
  <div class="hdr">
    <div class="hdr-badge">TEZU Intelligence &nbsp;|&nbsp; AI 業務効率化</div>
    <div class="hdr-copy">忙しいのに儲からない理由、<span class="acc">分かりますか？</span></div>
  </div>

  <!-- QR上コピー -->
  <div class="qr-copy">
    <div class="qr-copy-en">SCAN &amp; DIAGNOSE IN 30 SECONDS</div>
    <div class="qr-copy-ja">30秒で、あなたの<em>「無駄な時間」</em>を診断</div>
  </div>

  <!-- QRグロー（背景の光） -->
  <div class="qr-glow"></div>

  <!--
    QR コード（絶対的主役）
    ──────────────────────────────────────────
    差し替え方: src="" の値を任意の画像パスに変更するだけ
    例） src="qr_code.png"  /  src="data:image/png;base64,..."
    ──────────────────────────────────────────
  -->
  <div class="qr-wrap">
    <div class="qr-scan">▶ &nbsp; SCAN ME &nbsp; ◀</div>
    <div class="qr-frame">
      <img src="【QRcode】TEZUIntelligence.png" alt="AI業務診断 QRコード">
    </div>
  </div>

  <!-- AI導入（QR下の大訴求） -->
  <div class="ai-intro">
    <div class="ai-intro-main"><span class="gold">AI</span>導入</div>
    <span class="ai-intro-sub">登録不要　｜　完全無料</span>
  </div>

  <!--
  ════════════════════════════════════════════
  放射状バブル 6個  @  r=68mm
  QR中心(105, 156)mm → 各位置 (%, %)
   0°   右:   left=82.4%, top=52.5%
   60°  右下: left=66.2%, top=72.4%
  120°  左下: left=33.8%, top=72.4%
  180°  左:   left=17.6%, top=52.5%
  240°  左上: left=33.8%, top=32.7%
  300°  右上: left=66.2%, top=32.7%
  ════════════════════════════════════════════
  -->

  <!-- 0° 右 ── 集客の手間 -->
  <div class="bbl" style="left:82.4%;top:52.5%">
    <div class="bbl-icon">📢</div>
    <div class="bbl-lbl">集客の手間</div>
    <div class="bbl-sub">集客導線を<br>自動化！</div>
  </div>

  <!-- 60° 右下 ── 顧客管理 -->
  <div class="bbl" style="left:66.2%;top:72.4%">
    <div class="bbl-icon">👥</div>
    <div class="bbl-lbl">顧客管理</div>
    <div class="bbl-sub">顧客データを<br>一元管理！</div>
  </div>

  <!-- 120° 左下 ── 作業削減 -->
  <div class="bbl" style="left:33.8%;top:72.4%">
    <div class="bbl-icon">⚡</div>
    <div class="bbl-lbl">作業削減</div>
    <div class="bbl-sub">ムダな作業を<br>大幅カット！</div>
  </div>

  <!-- 180° 左 ── 返信の手間 -->
  <div class="bbl" style="left:17.6%;top:52.5%">
    <div class="bbl-icon">💬</div>
    <div class="bbl-lbl">返信の手間</div>
    <div class="bbl-sub">自動返信で<br>即対応！</div>
  </div>

  <!-- 240° 左上 ── 予約対応 -->
  <div class="bbl" style="left:33.8%;top:32.7%">
    <div class="bbl-icon">📅</div>
    <div class="bbl-lbl">予約対応</div>
    <div class="bbl-sub">自動化で<br>時間を削減！</div>
  </div>

  <!-- 300° 右上 ── 投稿の手間 -->
  <div class="bbl" style="left:66.2%;top:32.7%">
    <div class="bbl-icon">📱</div>
    <div class="bbl-lbl">投稿の手間</div>
    <div class="bbl-sub">SNS投稿を<br>自動化！</div>
  </div>

  <!-- CTA ボタン -->
  <div class="cta">
    <span class="cta-icon">📲</span>
    QRを読み取って今すぐ診断 →
  </div>

  <!-- フッター -->
  <div class="footer">TEZU Intelligence Inc.</div>

</div>
</body>
</html>
