<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TEZUIntelligence | AI業務診断</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&family=Inter:wght@700;900&display=swap" rel="stylesheet">
<style>

/* ══ 印刷設定 ══════════════════════════════════ */
@page { size: A4 portrait; margin: 0; }
@media print {
  html, body { width: 210mm; height: 297mm; background: none; }
  .flyer { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root { --g: #d6a451; --g2: #f0c46a; --bk: #0c0c0c; }
html { background: #3a3a3a; }
body {
  width: 210mm; margin: 0 auto;
  font-family: 'Noto Sans JP','Hiragino Kaku Gothic ProN','Meiryo',sans-serif;
}

/* ── チラシ本体 ── */
.flyer {
  width: 210mm; height: 297mm;
  background: var(--bk);
  position: relative; overflow: hidden;
}

/* ── 上下ゴールドライン ── */
.bar-top    { position: absolute; top: 0;    left: 0; right: 0; height: 5px;
              background: linear-gradient(90deg, var(--g), var(--g2), var(--g)); }
.bar-bottom { position: absolute; bottom: 0; left: 0; right: 0; height: 5px;
              background: linear-gradient(90deg, var(--g), var(--g2), var(--g)); }

/* ── コーナー装飾 ── */
.corner { position: absolute; width: 12mm; height: 12mm;
          border-color: rgba(214,164,81,.35); border-style: solid; }
.tl { top: 7mm;    left: 7mm;  border-width: 1.2px 0 0 1.2px; }
.tr { top: 7mm;    right: 7mm; border-width: 1.2px 1.2px 0 0; }
.bl { bottom: 7mm; left: 7mm;  border-width: 0 0 1.2px 1.2px; }
.br { bottom: 7mm; right: 7mm; border-width: 0 1.2px 1.2px 0; }

/* ══ ヘッダーブロック ══════════════════════════ */
.hdr {
  position: absolute; top: 11mm; left: 0; right: 0;
  text-align: center; padding: 0 16mm;
}
.eyebrow {
  font-size: 7px; letter-spacing: 4px; color: var(--g);
  font-weight: 700; margin-bottom: 9px;
  font-family: 'Inter','Arial',sans-serif; text-transform: uppercase;
}
.catch {
  font-size: 19.5px; font-weight: 900; color: #fff;
  line-height: 1.3; letter-spacing: -.3px;
}
.catch .acc { color: var(--g); }

/* ══ SVGオーバーレイ（放射線・同心円） ══════ */
.svg-layer {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%; pointer-events: none;
}

/* ══ QRグロー（背景光） ════════════════════════ */
.qr-glow {
  position: absolute; left: 50%; top: 46.5%;
  transform: translate(-50%, -50%);
  width: 116mm; height: 116mm; border-radius: 50%;
  background: radial-gradient(circle,
    rgba(214,164,81,.26) 0%,
    rgba(214,164,81,.08) 42%,
    transparent 62%);
  pointer-events: none; z-index: 5;
}

/* ══ QR上の見出し ══════════════════════════════ */
.qr-headline {
  position: absolute; left: 50%; top: 18.5%;
  transform: translateX(-50%);
  text-align: center; z-index: 10; width: 186mm;
}
.qr-hl-label {
  display: block; font-size: 7px; font-weight: 700;
  color: rgba(255,255,255,.28); letter-spacing: 3.5px;
  margin-bottom: 7px; text-transform: uppercase;
  font-family: 'Inter','Arial',sans-serif;
}
.qr-hl-main {
  display: block; font-size: 20px; font-weight: 900;
  color: #fff; line-height: 1.3; letter-spacing: -.2px;
}
.qr-hl-main em {
  color: var(--g); font-style: normal;
  border-bottom: 2.5px solid var(--g); padding-bottom: 1px;
}

/* ══ QR本体 ════════════════════════════════════ */
.qr-wrap {
  position: absolute; left: 50%; top: 46.5%;
  transform: translate(-50%, -50%);
  display: flex; flex-direction: column;
  align-items: center; z-index: 20;
}
.qr-scan-label {
  font-size: 7px; letter-spacing: 5px; color: var(--g);
  font-weight: 700; margin-bottom: 5px;
  font-family: 'Inter','Arial',sans-serif;
}
/* ゴールド発光フレーム */
.qr-frame {
  border: 5px solid var(--g);
  border-radius: 16px;
  padding: 10px;
  background: #fff;
  box-shadow:
    0 0 0 1px rgba(214,164,81,.4),
    0 0 18px rgba(214,164,81,1),
    0 0 44px rgba(214,164,81,.85),
    0 0 88px rgba(214,164,81,.58),
    0 0 140px rgba(214,164,81,.32),
    0 0 210px rgba(214,164,81,.14);
}
/* QR画像: 85mm × 85mm, ピクセル補間なし（精細表示） */
.qr-frame img {
  width: 85mm; height: 85mm; display: block;
  border-radius: 4px;
  image-rendering: crisp-edges;
  image-rendering: pixelated;
}

/* ══ QR下サブテキスト ══════════════════════════ */
.qr-sub {
  position: absolute; left: 50%; top: 64%;
  transform: translateX(-50%);
  text-align: center; z-index: 10; width: 150mm;
}
.qr-no-sales {
  font-size: 12.5px; font-weight: 900;
  color: rgba(255,255,255,.88); letter-spacing: .5px;
  margin-bottom: 5px;
}
.qr-no-sales .star { color: var(--g); margin-right: 1px; }
.qr-free {
  font-size: 8.5px; font-weight: 700;
  color: rgba(255,255,255,.38); letter-spacing: 3px;
}

/* ══ 放射状アイテム ════════════════════════════ */
.it {
  position: absolute; transform: translate(-50%, -50%);
  text-align: center; z-index: 15; width: 27mm;
  opacity: .75; /* QRより目立たせない */
}
.it-icon { font-size: 20px; line-height: 1; margin-bottom: 4px; }
.it-lbl {
  font-size: 10.5px; font-weight: 900; color: #fff;
  letter-spacing: .5px; margin-bottom: 2px;
}
.it-en {
  font-size: 6px; font-weight: 700; color: var(--g);
  letter-spacing: 2.5px;
  font-family: 'Inter','Arial',sans-serif;
}

/* ══ CTAボタン ═════════════════════════════════ */
.cta-btn {
  position: absolute; left: 50%; bottom: 18mm;
  transform: translateX(-50%);
  background: linear-gradient(135deg, var(--g) 0%, var(--g2) 50%, var(--g) 100%);
  color: #000; font-weight: 900; font-size: 14.5px;
  padding: 11px 30px; border-radius: 50px;
  letter-spacing: .5px; white-space: nowrap;
  box-shadow:
    0 0 24px rgba(214,164,81,.75),
    0 0 60px rgba(214,164,81,.3),
    0 5px 20px rgba(0,0,0,.55);
  z-index: 20;
}

/* ══ フッター ══════════════════════════════════ */
.foot {
  position: absolute; bottom: 8mm; left: 0; right: 0;
  text-align: center;
}
.foot-name {
  font-size: 6.5px; color: rgba(214,164,81,.4);
  letter-spacing: 3.5px; font-weight: 700;
  font-family: 'Inter','Arial',sans-serif;
}

</style>
</head>
<body>

  <!-- 上下ゴールドライン -->
