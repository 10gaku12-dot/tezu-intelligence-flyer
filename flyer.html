<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TEZUIntelligence | AI業務診断</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&family=Inter:wght@700;900&display=swap" rel="stylesheet">
<style>

/* ══ 印刷設定 ═══════════════════════════════════ */
@page { size: A4 portrait; margin: 0; }
@media print {
  html, body { width: 210mm; height: 297mm; background: none; }
  .flyer { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --g:  #d6a451;
  --g2: #f0c46a;
  --bk: #0a0a0b;
}
html { background: #333; }
body {
  width: 210mm; margin: 0 auto;
  font-family: 'Noto Sans JP','Hiragino Kaku Gothic ProN','Meiryo',sans-serif;
}

/* ── チラシ本体 ─────────────────────────────── */
.flyer {
  width: 210mm; height: 297mm;
  background: var(--bk);
  position: relative; overflow: hidden;
}

/* ── 上下ゴールドライン ─────────────────────── */
.bar-top {
  position: absolute; top: 0; left: 0; right: 0; height: 5px;
  background: linear-gradient(90deg, var(--g), var(--g2), var(--g));
}
.bar-bottom {
  position: absolute; bottom: 0; left: 0; right: 0; height: 5px;
  background: linear-gradient(90deg, var(--g), var(--g2), var(--g));
}

/* ── コーナー装飾 ───────────────────────────── */
.corner {
  position: absolute; width: 12mm; height: 12mm;
  border-color: rgba(214,164,81,.35); border-style: solid;
}
.tl { top: 7mm; left: 7mm;   border-width: 1.2px 0 0 1.2px; }
.tr { top: 7mm; right: 7mm;  border-width: 1.2px 1.2px 0 0; }
.bl { bottom: 7mm; left: 7mm;  border-width: 0 0 1.2px 1.2px; }
.br { bottom: 7mm; right: 7mm; border-width: 0 1.2px 1.2px 0; }

/* ══ ヘッダー ═══════════════════════════════════ */
.hdr {
  position: absolute; top: 11mm; left: 0; right: 0;
  text-align: center; padding: 0 18mm;
}
.eyebrow {
  font-size: 7px; letter-spacing: 4px; color: var(--g);
  font-weight: 700; margin-bottom: 8px;
  font-family: 'Inter','Arial',sans-serif; text-transform: uppercase;
}
.catch {
  font-size: 19px; font-weight: 900; color: #fff;
  line-height: 1.3; letter-spacing: -.3px;
}
.catch .acc { color: var(--g); }

/* ══ SVGオーバーレイ（放射構図の骨格） ════════ */
.svg-layer {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%; pointer-events: none; z-index: 2;
}

/* ══ QRグロー（背景光） ════════════════════════ */
.qr-glow {
  position: absolute; left: 50%; top: 54.5%;
  transform: translate(-50%, -50%);
  width: 122mm; height: 122mm; border-radius: 50%;
  background: radial-gradient(circle,
    rgba(214,164,81,.28) 0%,
    rgba(214,164,81,.10) 35%,
    rgba(214,164,81,.03) 55%,
    transparent 68%);
  pointer-events: none; z-index: 3;
}

/* ══ QR上の大見出し ════════════════════════════ */
.qr-headline {
  position: absolute; left: 50%; top: 19.5%;
  transform: translateX(-50%);
  text-align: center; z-index: 10; width: 180mm;
}
.qr-hl-label {
  display: block; font-size: 6.5px; font-weight: 700;
  color: rgba(255,255,255,.25); letter-spacing: 3.5px;
  margin-bottom: 6px; text-transform: uppercase;
  font-family: 'Inter','Arial',sans-serif;
}
.qr-hl-main {
  display: block; font-size: 19.5px; font-weight: 900;
  color: #fff; line-height: 1.3; letter-spacing: -.2px;
}
.qr-hl-main em {
  color: var(--g); font-style: normal;
  border-bottom: 2.5px solid var(--g); padding-bottom: 1px;
}

/* ══ QR本体 ════════════════════════════════════ */
.qr-wrap {
  position: absolute; left: 50%; top: 54.5%;
  transform: translate(-50%, -50%);
  display: flex; flex-direction: column;
  align-items: center; z-index: 20;
}
.qr-scan-label {
  font-size: 6.5px; letter-spacing: 5px; color: var(--g);
  font-weight: 700; margin-bottom: 4px;
  font-family: 'Inter','Arial',sans-serif;
}
/* 6層ゴールド発光フレーム */
.qr-frame {
  border: 5px solid var(--g);
  border-radius: 18px;
  padding: 10px;
  background: #fff;
  box-shadow:
    0 0 0 1px rgba(214,164,81,.45),
    0 0 20px rgba(214,164,81,1),
    0 0 48px rgba(214,164,81,.88),
    0 0 96px rgba(214,164,81,.60),
    0 0 150px rgba(214,164,81,.34),
    0 0 220px rgba(214,164,81,.15);
}
/* QR画像: 85mm × 85mm */
.qr-frame img {
  width: 85mm; height: 85mm; display: block;
  border-radius: 4px;
  image-rendering: crisp-edges;
  image-rendering: pixelated;
}

/* ══ QR下のシンプルテキスト ════════════════════ */
.qr-sub {
  position: absolute; left: 50%; top: 72%;
  transform: translateX(-50%);
  text-align: center; z-index: 10; white-space: nowrap;
}
.qr-free {
  font-size: 8.5px; font-weight: 700;
  color: rgba(255,255,255,.36); letter-spacing: 3.5px;
}

/* ══ 放射状アイテム ════════════════════════════ */
.it {
  position: absolute; transform: translate(-50%, -50%);
  text-align: center; z-index: 15; width: 31mm;
  opacity: .80;  /* パッと読めるが QRより控えめ */
}
.it-icon {
  font-size: 20px; line-height: 1; margin-bottom: 5px;
  filter: drop-shadow(0 0 5px rgba(214,164,81,.45));
}
/* メインラベル: 日本語を主役に大きく・太く */
.it-lbl {
  font-size: 13px; font-weight: 900; color: #fff;
  line-height: 1.25; letter-spacing: .3px;
}
/* 英語サブ: 極小・非常に薄くして補助のみ */
.it-en {
  display: block; font-size: 5px; font-weight: 700;
  color: rgba(214,164,81,.45); letter-spacing: 2px;
  margin-top: 3px;
  font-family: 'Inter','Arial',sans-serif;
}

/* ══ CTAボタン ══════════════════════════════════ */
.cta-btn {
  position: absolute; left: 50%; bottom: 17mm;
  transform: translateX(-50%);
  background: linear-gradient(135deg, var(--g) 0%, var(--g2) 50%, var(--g) 100%);
  color: #000; font-weight: 900; font-size: 14.5px;
  padding: 11px 30px; border-radius: 50px;
  letter-spacing: .5px; white-space: nowrap;
  box-shadow:
    0 0 28px rgba(214,164,81,.80),
    0 0 64px rgba(214,164,81,.32),
    0 5px 20px rgba(0,0,0,.6);
  z-index: 20;
}

/* ══ フッター ═══════════════════════════════════ */
.foot {
  position: absolute; bottom: 8mm; left: 0; right: 0;
  text-align: center;
}
.foot-name {
  font-size: 6px; color: rgba(214,164,81,.38);
  letter-spacing: 4px; font-weight: 700;
  font-family: 'Inter','Arial',sans-serif;
}

</style>
</head>
<body>
<div class="flyer">

  <!-- 上下ゴールドライン -->
  <div class="bar-top"></div>
  <div class="bar-bottom"></div>

  <!-- コーナー装飾 -->
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <!--
    SVGオーバーレイ: 放射状ライン・同心円・ドット
    ─ 座標はすべてmm単位（viewBox="0 0 210 297"）
    ─ QR中心: (105, 162)mm
    ─ 6方向: 0°/60°/120°/180°/240°/300°
    ─ 要素半径 r=78mm　ライン r=49→72mm　ドット r=75mm
  -->
  <svg class="svg-layer" viewBox="0 0 210 297" xmlns="http://www.w3.org/2000/svg">

    <!-- ■ 同心円（内→外で透明度を落とし、広がり感を演出） -->
    <circle cx="105" cy="162" r="48"
            fill="none" stroke="rgba(214,164,81,0.22)" stroke-width="0.65"/>
    <circle cx="105" cy="162" r="78"
            fill="none" stroke="rgba(214,164,81,0.10)" stroke-width="0.45"
            stroke-dasharray="1.8 3.2"/>
    <circle cx="105" cy="162" r="108"
            fill="none" stroke="rgba(214,164,81,0.048)" stroke-width="0.4"
            stroke-dasharray="1.2 4.5"/>
    <circle cx="105" cy="162" r="132"
            fill="none" stroke="rgba(214,164,81,0.018)" stroke-width="0.35"
            stroke-dasharray="0.8 6"/>

    <!-- ■ 6方向 放射状破線（QR枠端 r=49 → アイテム手前 r=72）
         各角の計算: cos/sin × r, SVGはy軸下向き正 -->
    <!-- 0° 右  cos=1   sin=0  -->
    <line x1="154" y1="162"   x2="177" y2="162"
          stroke="#d6a451" stroke-width="0.85" stroke-dasharray="2.2 2" opacity="0.85"/>
    <!-- 60° 右下  cos=0.5 sin=0.866  r49=(129.5,204.4) r72=(141,224.4) -->
    <line x1="129.5" y1="204.4" x2="141" y2="224.4"
          stroke="#d6a451" stroke-width="0.85" stroke-dasharray="2.2 2" opacity="0.85"/>
    <!-- 120° 左下  cos=-0.5 sin=0.866 -->
    <line x1="80.5" y1="204.4" x2="69" y2="224.4"
          stroke="#d6a451" stroke-width="0.85" stroke-dasharray="2.2 2" opacity="0.85"/>
    <!-- 180° 左  cos=-1  sin=0 -->
    <line x1="56" y1="162"   x2="33" y2="162"
          stroke="#d6a451" stroke-width="0.85" stroke-dasharray="2.2 2" opacity="0.85"/>
    <!-- 240° 左上  cos=-0.5 sin=-0.866 r49=(80.5,119.6) r72=(69,99.6) -->
    <line x1="80.5" y1="119.6" x2="69" y2="99.6"
          stroke="#d6a451" stroke-width="0.85" stroke-dasharray="2.2 2" opacity="0.85"/>
    <!-- 300° 右上  cos=0.5 sin=-0.866 -->
    <line x1="129.5" y1="119.6" x2="141" y2="99.6"
          stroke="#d6a451" stroke-width="0.85" stroke-dasharray="2.2 2" opacity="0.85"/>

    <!-- ■ 中間角のティックマーク（30/90/150/210/270/330°）
         r=53→60: アイテムの間を埋めて放射感を強化 -->
    <!-- 30°  cos=0.866 sin=0.5 → r53=(150.9,188.5) r60=(156.9,192) -->
    <line x1="150.9" y1="188.5" x2="156.9" y2="192"
          stroke="#d6a451" stroke-width="0.55" opacity="0.38"/>
    <!-- 90°  → r53=(105,215) r60=(105,222) -->
    <line x1="105"   y1="215"   x2="105"   y2="222"
          stroke="#d6a451" stroke-width="0.55" opacity="0.38"/>
    <!-- 150° cos=-0.866 sin=0.5 → r53=(59.1,188.5) r60=(53.1,192) -->
    <line x1="59.1"  y1="188.5" x2="53.1"  y2="192"
          stroke="#d6a451" stroke-width="0.55" opacity="0.38"/>
    <!-- 210° cos=-0.866 sin=-0.5 → r53=(59.1,135.5) r60=(53.1,132) -->
    <line x1="59.1"  y1="135.5" x2="53.1"  y2="132"
          stroke="#d6a451" stroke-width="0.55" opacity="0.38"/>
    <!-- 270° → r53=(105,109) r60=(105,102) -->
    <line x1="105"   y1="109"   x2="105"   y2="102"
          stroke="#d6a451" stroke-width="0.55" opacity="0.38"/>
    <!-- 330° cos=0.866 sin=-0.5 → r53=(150.9,135.5) r60=(156.9,132) -->
    <line x1="150.9" y1="135.5" x2="156.9" y2="132"
          stroke="#d6a451" stroke-width="0.55" opacity="0.38"/>

    <!-- ■ 各方向の端点ドット（r=75mm）: アイテムの到達点を示す -->
    <!-- 0°  (180, 162) -->
    <circle cx="180" cy="162"   r="2.6" fill="#d6a451" opacity="0.92"/>
    <!-- 60° (105+37.5=142.5, 162+64.9=226.9) -->
    <circle cx="142.5" cy="226.9" r="2.6" fill="#d6a451" opacity="0.92"/>
    <!-- 120° (67.5, 226.9) -->
    <circle cx="67.5"  cy="226.9" r="2.6" fill="#d6a451" opacity="0.92"/>
    <!-- 180° (30, 162) -->
    <circle cx="30"   cy="162"   r="2.6" fill="#d6a451" opacity="0.92"/>
    <!-- 240° (67.5, 97.1) -->
    <circle cx="67.5"  cy="97.1"  r="2.6" fill="#d6a451" opacity="0.92"/>
    <!-- 300° (142.5, 97.1) -->
    <circle cx="142.5" cy="97.1"  r="2.6" fill="#d6a451" opacity="0.92"/>

    <!-- ■ 外側の小ドット（r=108, 中間角に配置）: さらに外へ広がる演出 -->
    <!-- 30° r=108: (105+93.5,162+54)=(198.5,216)→範囲外 → 省略 -->
    <!-- 各方向軸上のr=108 -->
    <!-- 0°  (213, 162)→範囲外 省略 -->
    <!-- 90° (105, 270) -->
    <circle cx="105"   cy="270"   r="1.8" fill="#d6a451" opacity="0.28"/>
    <!-- 180° (−3, 162)→範囲外 省略 -->
    <!-- 270° (105, 54) -->
    <circle cx="105"   cy="54"    r="1.8" fill="#d6a451" opacity="0.28"/>

  </svg>

  <!-- ヘッダー -->
  <div class="hdr">
    <div class="eyebrow">TEZU Intelligence &nbsp;|&nbsp; AI 業務効率化</div>
    <div class="catch">忙しいのに儲からない理由、<span class="acc">分かりますか？</span></div>
  </div>

  <!-- QRグロー -->
  <div class="qr-glow"></div>

  <!-- QR上の大見出し
       top:19.5% = 57.9mm ／ QR中心 top:54.5% = 161.9mm -->
  <div class="qr-headline">
    <span class="qr-hl-label">SCAN &amp; DIAGNOSE IN 30 SECONDS</span>
    <span class="qr-hl-main">30秒で、あなたの<em>「無駄な時間」</em>を診断</span>
  </div>

  <!-- QR本体（主役・絶対的中心） -->
  <div class="qr-wrap">
    <span class="qr-scan-label">▶ &nbsp;&nbsp; SCAN ME &nbsp;&nbsp; ◀</span>
    <div class="qr-frame">
      <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAlgAAAJYAQMAAACEqAqfAAAABlBMVEX///8AAABVwtN+AAAACXBIWXMAAA7EAAAOxAGVKw4bAAAC6ElEQVR4nO3cTY6jMBCGYUdZsMwROApHg6NxFI6QZRbReORy2VX8ZFrdoiNn9H6LVgL4cVZdUBhCIISQd+YSt9EdffwTwhCf+nV0RywHoyYsLCwsrN+w5mC5JeuWGLE0XTq202nUWtyoDgsLCwvrI6xrLQC3WjskUjuG+Ei145GYu7NsFBYWFhbW26xb/ibn95JHcjs3DRYWFhbW/2CF9fn7kK2Qyobke3UICwsLC6sZy2K1QwbE3L8v/Zz1tYIFCwsLC+u3rE18z/0f/ZxNsLCwsLDato5Tjp1rbdCmjpaV7wQLCwsLqwVrVQWm0rqPWiC01fNQUMf0ubY8tbaMeT8WFhYW1tmWxAaE3Fh/eX4f3VxXXw8mLCwsLKzWLV8ApHbc06fNOnc/l/Vz5rAJFhYWFlajVrkpO+ad9wwWZqj3a83S9HnA7roDCwsLC+s0azVgcmtqbJ37nHd1eas1dZ66f3IzYGFhYWE1aq1qh2xNBeSSTuIlpWkzxqPM+aDOrc/BwsLCwmrf0qh1WY+zC4I+fZW5hvoLAhYWFhbW6VaJNWW8NecBq1ZOLQX7oVhYWFhYLVtWAKSA1P79ZX3+3mmrR0e96g1hYWFhYTVp2bXCI/25161LnWau0+wia+qnfT8HCwsLC+skyx5ekgHeCu4lX0HfNRDKLzAr1K1YWFhYWC1bYV077IUCQx5QIlZ0saFYWFhYWB9k1eWTEnuOtWS9P9ayE921AhYWFhbWadZRbJ27xd+DXfKHq1exsLCwsNq2LnEbvcfa52/lkSfp9+gRS+737MoGFhYWFlbT1hwsfs1M1F1DHuItyfVVPwcLCwsL60TL/nPbuwYWN01Z93jQc9/1hrCwsLCwPsuyd8tI2Rjr+OAy1K1YWFhYWB9qLflo2+Wfa9p0gb6+VsDCwsLC+qllUUt67va+x6BNGz2/99M8v+gNYWFhYWE1Y23ia8fRGkqdpq9bp/JDsLCwsLDatQgh5H35C9KdzEtvw9kMAAAAAElFTkSuQmCC" alt="AI業務診断 QRコード">
    </div>
  </div>

  <!-- QR下テキスト（シンプル1行のみ） -->
  <div class="qr-sub">
    <div class="qr-free">登録不要　｜　完全無料</div>
  </div>

  <!--
    放射状アイテム 6個 @ r=78mm  ─  文言: AIが削減する「手間・面倒」を直感表現
    ─ 0°   右:   left=87.1%, top=54.5%
    ─ 60°  右下: left=68.6%, top=77.3%
    ─ 120° 左下: left=31.4%, top=77.3%
    ─ 180° 左:   left=12.9%, top=54.5%
    ─ 240° 左上: left=31.4%, top=31.8%
    ─ 300° 右上: left=68.6%, top=31.8%
  -->
  <!-- 0° 右：集客の手間 -->
  <div class="it" style="left:87.1%;top:54.5%">
    <div class="it-icon">📢</div>
    <div class="it-lbl">集客の手間</div>
    <div class="it-en">MARKETING</div>
  </div>

  <!-- 60° 右下：顧客管理 -->
  <div class="it" style="left:68.6%;top:77.3%">
    <div class="it-icon">👥</div>
    <div class="it-lbl">顧客管理</div>
    <div class="it-en">CUSTOMER</div>
  </div>

  <!-- 120° 左下：作業削減 -->
  <div class="it" style="left:31.4%;top:77.3%">
    <div class="it-icon">⚡</div>
    <div class="it-lbl">作業削減</div>
    <div class="it-en">SAVE TIME</div>
  </div>

  <!-- 180° 左：返信の手間 -->
  <div class="it" style="left:12.9%;top:54.5%">
    <div class="it-icon">💬</div>
    <div class="it-lbl">返信の手間</div>
    <div class="it-en">AUTO REPLY</div>
  </div>

  <!-- 240° 左上：予約対応 -->
  <div class="it" style="left:31.4%;top:31.8%">
    <div class="it-icon">📅</div>
    <div class="it-lbl">予約対応</div>
    <div class="it-en">SCHEDULE</div>
  </div>

  <!-- 300° 右上：投稿の手間 -->
  <div class="it" style="left:68.6%;top:31.8%">
    <div class="it-icon">📱</div>
    <div class="it-lbl">投稿の手間</div>
    <div class="it-en">SNS POST</div>
  </div>

  <!-- CTAボタン -->
  <div class="cta-btn">QRを読み取って今すぐ診断 →</div>

  <!-- フッター -->
  <div class="foot">
    <div class="foot-name">TEZU INTELLIGENCE INC.</div>
  </div>

</div>
</body>
</html>
